<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Avis Google — Climeo34</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0f1e3d">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1e3a5c;
    --navy-dark: #0f1e3d;
    --green: #4db848;
    --blue: #3d7ab5;
    --white: #ffffff;
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(160deg, var(--navy-dark) 0%, var(--navy) 100%);
    color: var(--white);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  .page {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 28px 20px 32px;
    max-width: 420px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    width: 100%;
  }
  .brand {
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--white);
  }
  .brand span { color: var(--green); }
  .tagline {
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }

  /* Main card */
  .card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 28px 24px 24px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    backdrop-filter: blur(8px);
  }

  .card-title {
    font-size: 1.15rem;
    font-weight: 700;
    text-align: center;
    line-height: 1.3;
  }
  .stars {
    font-size: 1.4rem;
    letter-spacing: 2px;
    margin-bottom: -8px;
  }

  /* QR wrapper */
  .qr-wrap {
    background: white;
    border-radius: 16px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: fit-content;
  }
  .qr-wrap svg {
    display: block;
    width: 220px;
    height: 220px;
    border-radius: 8px;
  }
  .qr-label {
    font-size: 0.72rem;
    font-weight: 600;
    color: #1e3a5c;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .scan-hint {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.65);
    text-align: center;
    line-height: 1.5;
  }
  .scan-hint strong { color: var(--white); }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.15);
  }
  .divider span {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* NFC section */
  .nfc-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
  }

  .nfc-icon-wrap {
    position: relative;
    width: 64px;
    height: 64px;
  }
  .nfc-rings {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ring {
    position: absolute;
    border: 2px solid var(--green);
    border-radius: 50%;
    opacity: 0;
    animation: pulse-ring 2s ease-out infinite;
  }
  .ring:nth-child(1) { width: 48px; height: 48px; animation-delay: 0s; }
  .ring:nth-child(2) { width: 64px; height: 64px; animation-delay: 0.4s; }
  .ring:nth-child(3) { width: 80px; height: 80px; animation-delay: 0.8s; }

  @keyframes pulse-ring {
    0%   { transform: scale(0.7); opacity: 0.7; }
    100% { transform: scale(1.2); opacity: 0; }
  }

  .nfc-emoji {
    font-size: 2rem;
    position: relative;
    z-index: 1;
    line-height: 64px;
    width: 64px;
    text-align: center;
  }

  .nfc-label {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.65);
    text-align: center;
    line-height: 1.5;
  }
  .nfc-label strong { color: var(--white); }

  /* NFC button */
  #nfc-btn {
    background: linear-gradient(135deg, var(--green) 0%, #3a9235 100%);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 32px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  #nfc-btn:active { transform: scale(0.97); opacity: 0.9; }
  #nfc-btn:disabled {
    background: linear-gradient(135deg, #2a6a28 0%, #1e5220 100%);
    opacity: 0.7;
    cursor: default;
  }

  #nfc-status {
    font-size: 0.78rem;
    text-align: center;
    min-height: 18px;
    color: rgba(255,255,255,0.55);
    transition: color 0.3s;
  }
  #nfc-status.ok   { color: var(--green); }
  #nfc-status.err  { color: #f87171; }
  #nfc-status.wait { color: #60a5fa; }

  /* Footer link */
  .footer-link {
    display: block;
    text-align: center;
    color: rgba(255,255,255,0.35);
    font-size: 0.72rem;
    text-decoration: none;
    letter-spacing: 0.04em;
  }
  .footer-link:hover { color: rgba(255,255,255,0.6); }

  /* No NFC fallback */
  .no-nfc-note {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.4);
    text-align: center;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="brand">Climeo<span>34</span></div>
    <div class="tagline">Nettoyage Climatisation Montpellier</div>
  </header>

  <main class="card">
    <div class="stars">⭐⭐⭐⭐⭐</div>
    <div class="card-title">Votre avis nous aide à grandir&nbsp;!</div>

    <!-- QR Code (SVG intégré, pas de dépendance CDN) -->
    <div class="qr-wrap">

"/></svg>
      <div class="qr-label">climeo34.fr</div>
    </div>

    <p class="scan-hint">
      <strong>Ouvrez votre appareil photo</strong><br>
      et pointez-le sur le QR code
    </p>

    <div class="divider"><span>ou</span></div>

    <!-- NFC -->
    <div class="nfc-section" id="nfc-section">
      <div class="nfc-icon-wrap">
        <div class="nfc-rings">
          <div class="ring"></div>
          <div class="ring"></div>
          <div class="ring"></div>
        </div>
        <div class="nfc-emoji">📲</div>
      </div>

      <p class="nfc-label">
        <strong>Approchez votre téléphone</strong><br>
        du mien pour ouvrir le lien
      </p>

      <button id="nfc-btn" onclick="activateNFC()">
        <span id="nfc-btn-icon">⚡</span>
        <span id="nfc-btn-text">Activer NFC</span>
      </button>

      <div id="nfc-status"></div>
    </div>
  </main>

  <a class="footer-link" href="https://climeo34.fr">climeo34.fr</a>

</div>

<script>
  const REVIEW_URL = "https://maps.app.goo.gl/LucxK36ZqRZLxfrQ9?g_st=ac";

  // NFC
  let nfcActive = false;
  let nfcAbort = null;

  async function activateNFC() {
    const btn = document.getElementById('nfc-btn');
    const status = document.getElementById('nfc-status');
    const btnText = document.getElementById('nfc-btn-text');
    const btnIcon = document.getElementById('nfc-btn-icon');

    if (!('NDEFReader' in window)) {
      status.textContent = "NFC non disponible sur ce navigateur — utilisez le QR code";
      status.className = 'err';
      return;
    }

    if (nfcActive) {
      // Stop
      nfcAbort && nfcAbort.abort();
      nfcActive = false;
      btn.disabled = false;
      btnText.textContent = "Activer NFC";
      btnIcon.textContent = "⚡";
      status.textContent = "";
      status.className = '';
      return;
    }

    try {
      const ndef = new NDEFReader();
      nfcAbort = new AbortController();

      status.textContent = "En attente d'un téléphone…";
      status.className = 'wait';
      btn.disabled = true;
      btnText.textContent = "NFC actif — approchez…";
      btnIcon.textContent = "📡";
      nfcActive = true;

      // Write mode: fires when another NFC-capable device comes near
      await ndef.write(
        { records: [{ recordType: "url", data: REVIEW_URL }] },
        { signal: nfcAbort.signal }
      );

      status.textContent = "✓ Lien envoyé ! Le client peut laisser son avis.";
      status.className = 'ok';
      nfcActive = false;
      btn.disabled = false;
      btnText.textContent = "Activer NFC";
      btnIcon.textContent = "⚡";

    } catch (err) {
      nfcActive = false;
      btn.disabled = false;
      btnText.textContent = "Activer NFC";
      btnIcon.textContent = "⚡";

      if (err.name === 'AbortError') {
        status.textContent = "";
        status.className = '';
      } else if (err.name === 'NotAllowedError') {
        status.textContent = "Permission NFC refusée — autorisez dans les paramètres du navigateur";
        status.className = 'err';
      } else {
        status.textContent = "Erreur NFC — utilisez le QR code";
        status.className = 'err';
      }
    }
  }

  // Hide NFC section if API clearly not supported
  if (!('NDEFReader' in window)) {
    const note = document.createElement('p');
    note.className = 'no-nfc-note';
    note.textContent = '(NFC non disponible — utilisez le QR code)';
    const nfcSection = document.getElementById('nfc-section');
    nfcSection.innerHTML = '';
    nfcSection.appendChild(note);
  }
</script>
</body>
</html>
