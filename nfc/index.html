<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Avis Google — Climeo34</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0f1e3d">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1e3a5c;
    --navy-dark: #0f1e3d;
    --green: #4db848;
    --blue: #3d7ab5;
    --white: #ffffff;
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(160deg, var(--navy-dark) 0%, var(--navy) 100%);
    color: var(--white);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  .page {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 24px 20px 28px;
    max-width: 420px;
    margin: 0 auto;
  }

  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    width: 100%;
  }
  .brand {
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--white);
  }
  .brand span { color: var(--green); }
  .tagline {
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }

  .card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 28px 20px 24px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    backdrop-filter: blur(8px);
  }

  .stars {
    font-size: 1.6rem;
    letter-spacing: 3px;
  }

  .card-title {
    font-size: 1.2rem;
    font-weight: 700;
    text-align: center;
    line-height: 1.3;
  }

  /* Bouton principal — laisser un avis */
  .btn-review {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 18px 24px;
    background: linear-gradient(135deg, var(--green) 0%, #3a9235 100%);
    color: white;
    font-size: 1.05rem;
    font-weight: 800;
    border-radius: 50px;
    text-decoration: none;
    letter-spacing: 0.01em;
    box-shadow: 0 4px 20px rgba(77,184,72,0.35);
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-review:active { transform: scale(0.97); opacity: 0.9; }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.15);
  }
  .divider span {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* QR */
  .qr-wrap {
    background: white;
    border-radius: 16px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: fit-content;
  }
  .qr-wrap svg {
    display: block;
    width: 220px;
    height: 220px;
    border-radius: 6px;
  }
  .qr-label {
    font-size: 0.7rem;
    font-weight: 600;
    color: #1e3a5c;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .scan-hint {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.65);
    text-align: center;
    line-height: 1.5;
  }
  .scan-hint strong { color: var(--white); }

  /* Bouton partager */
  .btn-share {
    border: none;
    border-radius: 50px;
    padding: 14px 24px;
    font-size: 0.92rem;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    background: linear-gradient(135deg, #3d7ab5 0%, #2d5a9e 100%);
    color: white;
    transition: opacity 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-share:active { transform: scale(0.97); opacity: 0.9; }

  .action-label {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.45);
    text-align: center;
    letter-spacing: 0.03em;
  }

  .footer-link {
    display: block;
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 0.7rem;
    text-decoration: none;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="brand">Climeo<span>34</span></div>
    <div class="tagline">Nettoyage Climatisation Montpellier</div>

  <main class="card">
    <div class="stars">⭐⭐⭐⭐⭐</div>

    <!-- Bouton principal direct -->
    <a class="btn-review" href="https://maps.app.goo.gl/LucxK36ZqRZLxfrQ9?g_st=ac" target="_blank" rel="noopener">
      <span>⭐</span>

"/></svg>
      <div class="qr-label">Avis Google — climeo34.fr</div>
    </div>

    <p class="scan-hint">
      <strong>Ouvrez l'appareil photo</strong> et pointez-le sur le QR code
    </p>

    <div class="divider"><span>ou partagez</span></div>

    <!-- Partager — Web Share API -->
    <div style="width:100%;display:flex;flex-direction:column;gap:6px;align-items:center;">
      <button class="btn-share" onclick="shareLink()">
        <span>📤</span>
        <span>Envoyer le lien</span>
      </button>
      <span class="action-label">WhatsApp, SMS, AirDrop…</span>
    </div>
  </main>

  <a class="footer-link" href="https://climeo34.fr">climeo34.fr</a>
</div>

<script>
  const REVIEW_URL = "https://maps.app.goo.gl/LucxK36ZqRZLxfrQ9?g_st=ac";

  async function shareLink() {
    if (navigator.share) {
      try {
        await navigator.share({
          title: 'Laissez-nous un avis Google',
          text: 'Votre avis compte pour Climeo34 !',
          url: REVIEW_URL
        });
      } catch (e) {
        if (e.name !== 'AbortError') window.open(REVIEW_URL, '_blank');
      }
    } else {
      window.open(REVIEW_URL, '_blank');
    }
  }
</script>
</body>
</html>
